<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ELI Digital Academy - Practical Digital Skills for the Modern Workplace">
  <meta name="theme-color" content="#1a56db">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" href="icons/icon-72x72.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Dashboard | ELI Digital Academy</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <nav class="sidebar closed" id="sidebar" aria-label="Main navigation"></nav>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
      <header class="topbar" id="topbar"></header>

      <div class="content-area">
        <div id="welcomeHero"></div>

        <div id="dashboardStats"></div>

        <div class="grid grid-2">
          <div>
            <div class="card" style="margin-bottom:20px;">
              <div class="card-header">
                <h3 class="card-title">Recent Activity</h3>
                <a href="progress.html" class="btn btn-sm btn-ghost">View All</a>
              </div>
              <div id="recentActivity"></div>
            </div>
          </div>
          <div>
            <div id="levelDisplay"></div>
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">Quick Links</h3>
              </div>
              <div style="display:flex;flex-direction:column;gap:10px;">
                <a href="course.html" class="btn btn-outline" style="justify-content:flex-start;">📚 Continue Course</a>
                <a href="resources.html" class="btn btn-outline" style="justify-content:flex-start;">📎 Browse Resources</a>
                <a href="achievements.html" class="btn btn-outline" style="justify-content:flex-start;">🏆 View Achievements</a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <footer class="app-footer" id="footer"></footer>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/content-loader.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/quiz-engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
